<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji AI Sohbet</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e2e;
            --accent: #ff007a; 
            --user-bubble: #00c6ff;
            --text: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 10px;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 85vh;
            background: var(--card);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(255, 0, 122, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .chat-header {
            padding: 25px;
            background: linear-gradient(45deg, var(--accent), #7a00ff);
            text-align: center;
            font-weight: bold;
            font-size: 1.4rem;
            letter-spacing: 1px;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .msg {
            padding: 14px 18px;
            border-radius: 20px;
            max-width: 85%;
            font-size: 16px;
            line-height: 1.5;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .user-msg {
            background: var(--user-bubble);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai-msg {
            background: #2d2d44;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .typing-box {
            display: none;
            padding: 10px 20px;
            color: var(--accent);
            font-size: 14px;
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.3);
        }

        input {
            flex: 1;
            background: #2d2d44;
            border: none;
            padding: 15px;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            outline: none;
            border: 1px solid transparent;
        }

        input:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            color: white;
            border: none;
            width: 55px;
            height: 50px;
            border-radius: 15px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:hover { transform: rotate(10deg) scale(1.1); }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">EMOJI AI ✨</div>
    
    <div id="chat-window">
        <div class="msg ai-msg">Vibe kontrolü yapılıyor... ✅ Selam! Bugün modumuz nasıl? 🔥</div>
    </div>
    
    <div id="typing" class="typing-box">Emoji AI yazıyor... ✍️</div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Mesaj gönder..." autocomplete="off">
        <button id="sendBtn">🚀</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById("chat-window");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const typingIndicator = document.getElementById("typing");

    const aiBrain = {
        "selam": ["Selam tatlım! 💖", "Ooo kimleri görüyorum! 👋✨", "Selamlar! Enerjin buraya kadar geldi. 🔥"],
        "nasılsın": ["Enerjim tavan! ⚡ Sen nasılsın bakalım?", "Sistemler harika, senin için hazırım! 😎", "Vibe harika, her şey yolunda! 🌈"],
        "kimsin": ["Ben senin dijital ruh eşinim, Emoji AI! 💅✨", "Biraz kod, biraz emoji, çokça sevgi... İşte ben! 🤖💖"],
        "şaka": ["Bilgisayarım çok yavaşladı, galiba çok 'byte' (ısırık) yedi! 🍎😂", "Dün bir tweet attım, kuşlar hala geri getirmedi. 🐦🤣"],
        "üzgün": ["Kim üzdü seni? Hemen o modu değiştiriyoruz! 🍫✨", "Gel bir sarılalım (sanal olarak)! 🤗💖 Her şey geçecek."],
        "iyiyim": ["İşte duymak istediğim bu! 💥", "Süper! Bu enerjiyi bozmayalım. 🌊"],
        "default": ["Hmm, ilginç! Biraz daha anlatsana... 🍿", "Bunu sevdim! Başka? ✨", "Anlıyorum bebeğim... 💅", "Gerçekten mi? Şaşırdım! 😲"]
    };

    function addMessage(text, isUser) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `msg ${isUser ? 'user-msg' : 'ai-msg'}`;
        msgDiv.innerText = text;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function getAiResponse(text) {
        const lowerText = text.toLowerCase();
        let category = "default";

        for (let key in aiBrain) {
            if (lowerText.includes(key)) {
                category = key;
                break;
            }
        }

        const choices = aiBrain[category];
        return choices[Math.floor(Math.random() * choices.length)];
    }

    function send() {
        const val = userInput.value.trim();
        if(!val) return;

        addMessage(val, true);
        userInput.value = "";
        
        typingIndicator.style.display = "block";
        chatWindow.scrollTop = chatWindow.scrollHeight;

        setTimeout(() => {
            typingIndicator.style.display = "none";
            addMessage(getAiResponse(val), false);
        }, 1000 + Math.random() * 1000);
    }

    sendBtn.onclick = send;
    userInput.onkeypress = (e) => { if(e.key === "Enter") send(); };
</script>

</body>
</html>
